<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Password reset</title>
</head>

<body class="login reset" dir="rtl">
    <div class="logo">
        <div class="container">
            <img src="imges/about-us/Group.png" alt="">
        </div>
    </div>

    <section class="login-sec">
        <div class="wrapper">
            <div class="head">
                <div class="text">
                    <h1>تعيين كلمة المرور الجديدة</h1>
                    <p>قم بتعيين كلمة المرور الجديدة لحسابك حتى تتمكن من تسجيل الدخول  </p>
                </div><!--./text-->

            </div><!--./head-->

            <div class="form">
                <form action="">
                    <div class="input">
                        <label for="pass"> كلمة المرور الجديدة</label>
                        <input type="password" id="pass" placeholder="....">
                    </div><!--./input-->

                    <div class="input">
                        <label for="pass-auth">تأكيد كلمة المرور الجديدة</label>
                        <input type="password" id="pass-auth" placeholder="....">
                    </div><!--./input-->

                    <button>تأكيد</button>
                </form>



            </div><!--./form-->
        </div><!--./wrapper-->
    </section>

</body>

</html>
