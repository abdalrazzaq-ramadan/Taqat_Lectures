<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Login</title>
</head>

<body class="login" dir="rtl">
    <div class="logo">
        <div class="container">
            <img src="imges/about-us/Group.png" alt="">
        </div>
    </div>

    <section class="login-sec">
        <div class="wrapper">
            <div class="head">

                <div class="logo">
                    <img src="imges/about-us/Group.png" alt="">
                </div><!--./logo-->
                <div class="text">
                    <h1>تسجيل الدخول إلى الحساب</h1>
                    <p>ادخل البريد الإلكتروني أو رقم الهاتف وكلمة المرور</p>
                </div><!--./text-->

            </div><!--./head-->

            <div class="form">
                <form action="">
                    <div class="input">
                        <label for="email">عنوان البريد الإلكتروني</label>
                        <input type="text" placeholder="البريد الإلكتروني" id="email">
                    </div><!--./input-->
                    <div class="input">
                        <label for="pass">كلمة المرور</label>
                        <input type="password" id="pass" placeholder="Password">
                    </div><!--./input-->
                    <div class="remind">
                        <div>
                            <label for="remind">تذكر كلمة المرور</label>
                            <input type="checkbox" id="remind">
                        </div>

                        <div class="forget-mypass">
                            <a href="forget-pass.html" target="_blank">هل نسيت كلمة المرور ؟</a>
                        </div>
                    </div>


                    <button>تسجيل الدخول</button>
                    <span>ليس لديك حساب ؟</span>
                    <a href="signin.html" target="_blank">إنشاء حساب</a>
                </form>

                <div class="login-by">
                    <a href="" class="partner">
                        <img src="imges/contact/Group 3455.png" alt="">
                        <p>الدخول باستخدام فيسبوك</p>
                    </a><!--./partner-->

                    <a href="" class="partner">
                        <img src="imges/contact/search 1.png" alt="">
                        <p>الدخول باستخدام Google</p>
                    </a><!--./partner-->
                </div>


            </div><!--./form-->
        </div><!--./wrapper-->
    </section>

</body>

</html>
