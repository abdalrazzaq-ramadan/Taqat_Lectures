<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>signin</title>
</head>

<body class="login" dir="rtl">
    <div class="logo">
        <div class="container">
            <img src="imges/about-us/Group.png" alt="">
        </div>
    </div>

    <section class="login-sec">
        <div class="wrapper">
            <div class="head">

                <div class="logo">
                    <img src="imges/about-us/Group.png" alt="">
                </div><!--./logo-->
                <div class="text">
                    <h1>إنشاء حساب جديد</h1>
                    <p> أدخل بينتاتك لإنشاء حساب جديد</p>
                </div><!--./text-->

            </div><!--./head-->

            <div class="form">
                <form action="">
                    <div class="input">
                        <label for="name">الاسم</label>
                        <input type="text" placeholder="الاسم" id="name">
                    </div><!--./input-->
                    <div class="input">
                        <label for="phone">رقم الهاتف</label>
                        <input type="password" id="phone" placeholder="رقم الهاتف">
                    </div><!--./input-->
                    <div class="input">
                        <label for="email">البريد الالكتروني</label>
                        <input type="password" id="email" placeholder="user.user@email.com">
                    </div><!--./input-->
                    <div class="input">
                        <label for="pass">كلمة السر</label>
                        <input type="password" id="phone" placeholder="......">
                    </div><!--./input-->
                    <div class="input">
                        <label for="pass-auth">تأكيد كلمة السر</label>
                        <input type="password" id="pass-auth" placeholder="......">
                    </div><!--./input-->
                    


                    <button> انشاء حساب</button>
                    <span>لديك حساب بالفعل</span>
                    <a href="login.html">تسجيل الدخول</a>
                </form>

                <div class="login-by">
                    <a href="" class="partner">
                        <img src="imges/contact/Group 3455.png" alt="">
                        <p>الدخول باستخدام فيسبوك</p>
                    </a><!--./partner-->

                    <a href="" class="partner">
                            <img src="imges/contact/search 1.png" alt="">
                            <p>الدخول باستخدام Google</p>
                    </a><!--./partner-->
                </div>


            </div><!--./form-->
        </div><!--./wrapper-->
    </section>

</body>

</html>
